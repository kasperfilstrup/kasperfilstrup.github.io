<footer class="site-footer">
  <div class="site-footer__grid">
    <div class="site-footer__column">
      <p class="site-footer__label">Visit us</p>
      {% for line in site.address_lines %}
        <p>{{ line }}</p>
      {% endfor %}
    </div>
    <div class="site-footer__column">
      <p class="site-footer__label">Kontakt</p>
      <p>
        <a href="mailto:{{ site.email }}">{{ site.email }}</a>
      </p>
    </div>
    <div class="site-footer__column">
      <p class="site-footer__label">Følg med</p>
      <p>
        <a
          class="site-footer__link"
          href="{{ site.social_links.instagram }}"
          target="_blank"
          rel="noopener"
          >Instagram</a
        >
      </p>
      <p>
        <a
          class="site-footer__link"
          href="{{ site.social_links.facebook }}"
          target="_blank"
          rel="noopener"
          >Facebook</a
        >
      </p>
    </div>
    <div class="site-footer__column">
      <p class="site-footer__label">Åbningstider</p>
      {% for entry in site.opening_hours %}
        <p>{{ entry }}</p>
      {% endfor %}
    </div>
  </div>
</footer>
