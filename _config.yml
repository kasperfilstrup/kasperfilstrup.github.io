# Site settings
title: 'Manna Café'
description: 'Omfavner skandinavisk enkelhed, én kop ad gangen.'
baseurl: '' # the subpath of your site, e.g. /blog
url: 'https://kasperfilstrup.github.io' # the base hostname & protocol for your site

# Custom domain configuration (commented out for development)
# When ready to use custom domain, uncomment these lines and create CNAME file:
# baseurl: ""
# url: "https://mannacafe.dk"
# enforce_ssl: mannacafe.dk

# Contact information
email: 'info@mannacafe.dk'
phone: ''
address: 'Under Elmene 13, 2300 København S'
address_lines:
  - 'Under Elmene 13'
  - 'København S, 2300'
social:
  instagram: 'https://www.instagram.com/manna_cafe/'
  facebook: 'https://www.facebook.com/profile.php?id=61587665537345'

# Opening hours (rendered in the site footer)
opening_hours:
  - 'Tirsdag: 8-20'
  - 'Onsdag: 8-22'
  - 'Torsdag: 8-22'
  - 'Fredag: 9-24'
  - 'Lørdag: 9-24'
  - 'Søn: 9-15'

# Navigation
navigation:
  - name: 'Hjem'
    url: '/'
  - name: 'Menu'
    url: '/menu/'
  - name: 'Om os'
    url: '/om-os/'

# Build settings
markdown: kramdown

# SASS settings
sass:
  sass_dir: _sass
  style: expanded

# Permalink settings for clean URLs
permalink: pretty

# Jekyll compatibility for GitHub Pages
kramdown:
  input: GFM
  hard_wrap: false

# Exclude development files
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - memory-bank/
  - node_modules/
  - package.json
  - package-lock.json
  - tailwind.config.js
  - postcss.config.js
  - src/
  - vendor/
  - .bundle/
  - _config.production.yml
