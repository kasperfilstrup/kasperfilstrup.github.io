        description: 'Hjemmebagt surdejsbrød, pisket smør, syltetøj efter sæsonen, økologisk æg, yoghurt toppet med kompot, hjemmelavet granola og honning'
        price: '95 kr'
      - name: 'Wienerbrød'
        description: 'Friskbagt og hjemmelavet'
        price: '38 kr'
      - name: 'Yoghurt med granola'
        description: 'Økologisk yoghurt toppet med hjemmelavet granola, honning og kompot af sæsonens frugt og bær'
        price: '65 kr'
      - name: 'Dagens morgenmad'
        description: ''
        price: '85 kr'

  - title: 'Smørrebrød'
    description: 'hverdage 11:30-14'
    items:
      - name: 'Hønsesalat m. æble og svampe'
        description: 'Hjemmebagt surdejsrugbrød med hjemmelavet hønsesalat, æbler, svampe, selleri, bagte tomater, friteret porre og karse'
        price: '95 kr'
      - name: 'Kartoffel og chorizo'
        description: 'Hjemmebagt surdejsrugbrød med kartofler, stegt chorizo, løgkompot, hjemmelavet mayo, kørvel, dild og karse'
        price: '95 kr'
      - name: 'Øko æg m. citron mayo'
        description: 'Hjemmebagt surdejsrugbrød med økologisk æg, citronmayo, bagte cherrytomater, friteret persille toppet med sprødt rugknas'
        price: '95 kr'

  - title: 'Sandwiches'
    description: 'hverdage 11:30-14'
    items:
      - name: 'Flæsk & Sennep på Surdej'
        description: 'Langtidsstegt flæsk, sennepsmayo, coleslaw med lime, tomat, syltet glaskål, ristede hvedekerner, chilicreme og parmesan'
        price: '165 kr'
      - name: 'Svampe og basilikum på surdej'
        name_extra: 'Veg'
        description: 'Friskhøstede svampe, basilikumsmayo, hvidkål, tomat, sylt, chutney og ristede kerner'
        price: '165 kr'
      - name: 'Blomkål & Gochujang på Surdej'
        name_extra: 'V'
        description: 'Friteret blomkål, rød mojo, kimchisylt, bønnecreme, gochujang, hjertesalat, ristede cashewnødder, sesam og mikrogrønt'
        price: '165 kr'

