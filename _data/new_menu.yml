sections:
  - title: 'Morgenmad'
    description: 'hverdage 8-11'
    items:
      - name: 'Amagermad m. ost'
        description: 'Hjemmebagt rugbrød og surdejsbrød lavet på mel fra Vild Hvede, smør og ost'
        price: '45 kr'
